name: Maru Test Suite

test_scope_includes:
  - .ci
  - tests
schedule: "0 21 * * *"
description: "Maru Test Suite"

targets:
  native:
    - build:
      - python3 -m venv .venv
      - source .venv/bin/activate
      - pip install -r requirements.txt
      - pip install -r requirements-dev.txt
      - pip install -e .
    - init:
      - echo "Initializing native test environment"
    - post:
      - success:
        - echo "Native tests completed successfully"
      - failure:
        - echo "Native tests failed"
    - exit:
      - echo "Exiting native test environment"
    - stop-on-error: true